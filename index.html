<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoMapArt | Topographic Wall Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black: #0a0a0a;
    --charcoal: #1c1c1c;
    --white: #ffffff;
    --clay: #cc6b3f;
    --clay-light: #e08a5f;
    --gray-text: #b8b8b8;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    width:100%;
    height:100%;
    background:var(--white);
    color:var(--black);
    font-family:'Inter', -apple-system, sans-serif;
  }

  a{ text-decoration:none; color:inherit; }

  :focus-visible{
    outline: 2px solid var(--clay);
    outline-offset: 3px;
  }

  .banner{
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--black);
    background-image: repeating-radial-gradient(
      circle at 88% 50%,
      transparent 0px,
      transparent 11px,
      rgba(255,255,255,0.045) 11px,
      rgba(255,255,255,0.045) 12px
    );
    border-bottom: 1px solid var(--charcoal);
  }

  .banner-inner{
    max-width: 1280px;
    margin: 0 auto;
    display:flex;
    align-items:center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding: 18px 32px;
  }

  .logo{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 1.5rem;
    color: var(--white);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .contact-group{
    display:flex;
    align-items:center;
    flex-wrap: wrap;
    gap: 22px;
  }

  .ig-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: var(--white);
    color: var(--black);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size: 0.88rem;
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--white);
    transition: background-color 0.18s ease, color 0.18s ease, transform 0.12s ease;
    white-space: nowrap;
  }

  .ig-btn:hover, .ig-btn:focus-visible{
    background: var(--clay);
    color: var(--white);
    border-color: var(--clay);
    transform: translateY(-1px);
  }

  .ig-btn svg{ width:16px; height:16px; flex-shrink:0; }

  .contact-link{
    display:inline-flex;
    align-items:center;
    gap:7px;
    color: var(--gray-text);
    font-size: 0.88rem;
    font-weight:500;
    white-space: nowrap;
    transition: color 0.15s ease;
  }

  .contact-link svg{ width:15px; height:15px; flex-shrink:0; opacity:0.85; }

  .contact-link:hover, .contact-link:focus-visible{
    color: var(--clay-light);
  }

  main{
    background: var(--white);
  }

  /* ---- Product section: duplicate .product-section for each new size/price row down the page ---- */

  .product-section{
    max-width: 1280px;
    margin: 0 auto;
    padding: 56px 32px 72px;
  }

  .product-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  .product-card{
    display:flex;
    flex-direction: column;
  }

  .section-intro{
    text-align:center;
    font-size: 0.95rem;
    color: #5a5a5a;
    margin-bottom: 28px;
    letter-spacing: 0.01em;
  }

  .size-legend{
    display:flex;
    justify-content:center;
    gap: 64px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .size-option{
    text-align:center;
    line-height: 1.2;
  }

  .product-size{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size: 1.3rem;
    color: var(--black);
    margin:0;
  }

  .product-price{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size: 1.3rem;
    color: var(--black);
    margin:0;
  }

  .product-image-frame{
    position:relative;
    width:100%;
    aspect-ratio: 3 / 4;
    overflow:hidden;
    border: 1px solid var(--black);
    background: var(--charcoal);
  }

  .product-image-frame img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
    transition: transform 0.4s ease;
  }

  .product-card:hover .product-image-frame img{
    transform: scale(1.04);
  }

  .product-caption{
    text-align:center;
    margin-top: 16px;
    font-size: 1.05rem;
    color: var(--black);
  }

  @media (max-width: 900px){
    .product-grid{
      grid-template-columns: 1fr;
      gap: 48px;
      max-width: 420px;
      margin: 0 auto;
    }
  }

  @media (max-width: 640px){
    .banner-inner{
      flex-direction: column;
      align-items: flex-start;
      padding: 16px 20px;
    }
    .contact-group{
      width: 100%;
      gap: 14px;
    }
    .product-section{
      padding: 40px 20px 56px;
    }
    .size-legend{
      gap: 32px;
    }
  }
</style>
</head>
