<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoMapArt | Topographic Wall Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black: #0a0a0a;
    --charcoal: #1c1c1c;
    --white: #ffffff;
    --clay: #cc6b3f;
    --clay-light: #e08a5f;
    --gray-text: #b8b8b8;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    width:100%;
    height:100%;
    background:var(--white);
    color:var(--black);
    font-family:'Inter', -apple-system, sans-serif;
  }

  a{ text-decoration:none; color:inherit; }

  :focus-visible{
    outline: 2px solid var(--clay);
    outline-offset: 3px;
  }

  .banner{
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--black);
    background-image: repeating-radial-gradient(
      circle at 88% 50%,
      transparent 0px,
      transparent 11px,
      rgba(255,255,255,0.045) 11px,
      rgba(255,255,255,0.045) 12px
    );
    border-bottom: 1px solid var(--charcoal);
  }

  .banner-inner{
    max-width: 1280px;
    margin: 0 auto;
    display:flex;
    align-items:center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding: 18px 32px;
  }

  .logo{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: 1.5rem;
    color: var(--white);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .contact-group{
    display:flex;
    align-items:center;
    flex-wrap: wrap;
    gap: 22px;
  }

  .ig-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: var(--white);
    color: var(--black);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size: 0.88rem;
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--white);
    transition: background-color 0.18s ease, color 0.18s ease, transform 0.12s ease;
    white-space: nowrap;
  }

  .ig-btn:hover, .ig-btn:focus-visible{
    background: var(--clay);
    color: var(--white);
    border-color: var(--clay);
    transform: translateY(-1px);
  }

  .ig-btn svg{ width:16px; height:16px; flex-shrink:0; }

  .contact-link{
    display:inline-flex;
    align-items:center;
    gap:7px;
    color: var(--gray-text);
    font-size: 0.88rem;
    font-weight:500;
    white-space: nowrap;
    transition: color 0.15s ease;
  }

  .contact-link svg{ width:15px; height:15px; flex-shrink:0; opacity:0.85; }

  .contact-link:hover, .contact-link:focus-visible{
    color: var(--clay-light);
  }

  main{
    background: var(--white);
  }

  /* ---- Product section: duplicate .product-section for each new size/price row down the page ---- */

  .product-section{
    max-width: 1280px;
    margin: 0 auto;
    padding: 56px 32px 72px;
  }

  .product-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  .product-card{
    display:flex;
    flex-direction: column;
  }

  .product-meta{
    text-align:center;
    margin-bottom: 18px;
  }

  .product-size{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size: 1.3rem;
    color: var(--black);
  }

  .product-price{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size: 1.3rem;
    color: var(--black);
    margin-top: 2px;
  }

  .product-image-frame{
    position:relative;
    width:100%;
    aspect-ratio: 3 / 4;
    overflow:hidden;
    border: 1px solid var(--black);
    background: var(--charcoal);
  }

  .product-image-frame img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
    transition: transform 0.4s ease;
  }

  .product-card:hover .product-image-frame img{
    transform: scale(1.04);
  }

  .product-caption{
    text-align:center;
    margin-top: 16px;
    font-size: 1.05rem;
    color: var(--black);
  }

  @media (max-width: 900px){
    .product-grid{
      grid-template-columns: 1fr;
      gap: 48px;
      max-width: 420px;
      margin: 0 auto;
    }
  }

  @media (max-width: 640px){
    .banner-inner{
      flex-direction: column;
      align-items: flex-start;
      padding: 16px 20px;
    }
    .contact-group{
      width: 100%;
      gap: 14px;
    }
    .product-section{
      padding: 40px 20px 56px;
    }
  }
</style>
</head>
<body>

<header class="banner">
  <div class="banner-inner">
    <a href="/" class="logo">GeoMapArt</a>

    <div class="contact-group">
      <a class="ig-btn" href="https://www.instagram.com/geomapart/" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="17.5" cy="6.5" r="0.6" fill="currentColor" stroke="none"></circle>
        </svg>
        Order via Instagram
      </a>

      <a class="contact-link" href="mailto:EEGeotech@gmail.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"></rect>
          <path d="m22 6-10 7L2 6"></path>
        </svg>
        EEGeotech@gmail.com
      </a>

      <a class="contact-link" href="tel:+13039151241">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
        303-915-1241
      </a>
    </div>
  </div>
</header>

<main>

  <section class="product-section">
    <div class="product-grid">

      <article class="product-card">
        <div class="product-meta">
          <p class="product-size">12&quot; x 16&quot;</p>
          <p class="product-price">$120</p>
        </div>
        <div class="product-image-frame">
          <img src="images/front-range-colorado.jpg" alt="Topographic relief print of the Front Range, Colorado">
        </div>
        <p class="product-caption">Front Range Colorado</p>
      </article>

      <article class="product-card">
        <div class="product-meta">
          <p class="product-size">18&quot; x 24&quot;</p>
          <p class="product-price">$240</p>
        </div>
        <div class="product-image-frame">
          <img src="images/rocky-mountain-np.jpg" alt="Topographic relief print of Rocky Mountain National Park">
        </div>
        <p class="product-caption">Rocky Mountain National Park</p>
      </article>

      <article class="product-card">
        <div class="product-meta">
          <p class="product-size">24&quot; x 32&quot;</p>
          <p class="product-price">$420</p>
        </div>
        <div class="product-image-frame">
          <img src="images/indian-peaks-wilderness.jpg" alt="Topographic relief print of the Indian Peaks Wilderness">
        </div>
        <p class="product-caption">Indian Peaks Wilderness</p>
      </article>

    </div>
  </section>

  <!-- Next size/price section goes here as you scroll -->

</main>

</body>
</html>
